      include-interface-regex: .*Repository
  github.com/poymanov/codemania-task-board/board/internal/infrastructure/persistance/tx_manager:
    config:
      include-interface-regex: .*Tx
  github.com/poymanov/codemania-task-board/auth/internal/domain/user:
