syntax = "proto3";

package auth.v1;

import "validate/validate.proto";

option go_package = "github.com/poymanov/codemania-task-board/pkg/proto/auth/v1;auth_v1";

service UserService {
  rpc Register(UserServiceRegisterRequest) returns (UserServiceRegisterResponse);
}

// Запрос на регистрацию пользователя
message UserServiceRegisterRequest {
  // Логин пользователя
  string login = 1 [(validate.rules).string = {min_len: 1}];

  // Пароль пользователя
  string password = 2 [(validate.rules).string = {min_len: 1}];

  // Имя пользователя
  string username = 3 [(validate.rules).string = {min_len: 1}];

  // Email пользователя
  string email = 4 [(validate.rules).string.email = true];
}

// Ответ на регистрацию пользователя
message UserServiceRegisterResponse {

}